<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nostr Articles Explorer</title>
<style>
:root {
  --bg: #0b1929;
  --bg2: #142840;
  --surface: rgba(20, 40, 64, 0.7);
  --surface-solid: #142840;
  --surface2: rgba(30, 55, 85, 0.6);
  --border: rgba(56, 189, 248, 0.12);
  --border-hover: rgba(56, 189, 248, 0.35);
  --text: #e2e8f0;
  --text-dim: #7b92a9;
  --accent: #38bdf8;
  --accent2: #0ea5e9;
  --accent3: #22d3ee;
  --accent-glow: rgba(56, 189, 246, 0.25);
  --green: #34d399;
  --orange: #fbbf24;
  --red: #f87171;
  --bolt: #f59e0b;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated mesh background */
#bgCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 15% 30%, rgba(56, 189, 248, 0.07) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 60%, rgba(14, 165, 233, 0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 90%, rgba(34, 211, 238, 0.04) 0%, transparent 40%);
  pointer-events: none;
  z-index: 0;
}

/* Header */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(11, 25, 41, 0.8);
  backdrop-filter: blur(24px) saturate(1.4);
  border-bottom: 1px solid var(--border);
  padding: 0.75rem 2rem;
}

.header-content {
  max-width: 1440px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.75rem;
}

.logo {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-size: 1.35rem;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent3));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  animation: logoPulse 3s ease-in-out infinite;
  box-shadow: 0 0 20px var(--accent-glow);
}

@keyframes logoPulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 20px var(--accent-glow); }
  50% { transform: scale(1.08); box-shadow: 0 0 30px var(--accent-glow), 0 0 60px rgba(56,189,248,0.1); }
}

.logo-text {
  background: linear-gradient(135deg, var(--accent), var(--accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header-center {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.stats-bar {
  display: flex;
  gap: 1rem;
  font-size: 0.8rem;
}

.stat {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  color: var(--text-dim);
  padding: 0.3rem 0.7rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

.stat strong { color: var(--accent); font-variant-numeric: tabular-nums; }

.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}

.dot.green { background: var(--green); box-shadow: 0 0 8px rgba(52, 211, 153, 0.5); }
.dot.orange { background: var(--orange); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.header-right {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.search-bar {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.5rem 0.9rem;
  min-width: 240px;
  backdrop-filter: blur(10px);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.search-bar:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.search-bar input {
  background: none;
  border: none;
  color: var(--text);
  font-size: 0.85rem;
  width: 100%;
  outline: none;
}

.search-bar input::placeholder { color: var(--text-dim); }
.search-bar svg { color: var(--text-dim); flex-shrink: 0; }

.search-kbd {
  font-size: 0.65rem;
  padding: 0.1rem 0.4rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-dim);
  font-family: monospace;
}

/* Icon buttons */
.icon-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  backdrop-filter: blur(10px);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}

.icon-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 16px var(--accent-glow);
}

.icon-btn .tooltip {
  position: absolute;
  bottom: -30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface-solid);
  border: 1px solid var(--border);
  padding: 0.2rem 0.5rem;
  border-radius: 6px;
  font-size: 0.7rem;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
}

.icon-btn:hover .tooltip { opacity: 1; }

/* Main layout */
.container {
  max-width: 1440px;
  margin: 0 auto;
  padding: 1.25rem 2rem;
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 1.25rem;
  position: relative;
  z-index: 1;
}

/* Sidebar */
.sidebar {
  position: sticky;
  top: 72px;
  height: fit-content;
  max-height: calc(100vh - 90px);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1rem;
  backdrop-filter: blur(16px);
  transition: border-color 0.25s;
}

.panel:hover { border-color: var(--border-hover); }

.panel-title {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  margin-bottom: 0.65rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* Filter toggle */
.filter-toggle {
  display: flex;
  background: rgba(11, 25, 41, 0.6);
  border-radius: 8px;
  padding: 3px;
  margin-bottom: 0.65rem;
  border: 1px solid var(--border);
}

.filter-toggle button {
  flex: 1;
  padding: 0.35rem 0.7rem;
  border: none;
  border-radius: 6px;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  background: transparent;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}

.filter-toggle button.active {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: var(--bg);
  box-shadow: 0 2px 12px var(--accent-glow);
}

/* Tag checkboxes */
.tag-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
  max-height: 300px;
  overflow-y: auto;
}

.tag-list::-webkit-scrollbar { width: 2px; }
.tag-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.tag-item {
  display: flex;
  align-items: center;
  gap: 0.45rem;
  padding: 0.3rem 0.45rem;
  border-radius: 7px;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 0.82rem;
}

.tag-item:hover { background: rgba(56, 189, 248, 0.06); }

.tag-item input[type="checkbox"] {
  appearance: none;
  width: 15px;
  height: 15px;
  border: 1.5px solid var(--text-dim);
  border-radius: 4px;
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
  transition: all 0.15s;
}

.tag-item input[type="checkbox"]:checked {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-color: var(--accent);
}

.tag-item input[type="checkbox"]:checked::after {
  content: '';
  position: absolute;
  left: 3.5px;
  top: 0.5px;
  width: 4px;
  height: 8px;
  border: solid var(--bg);
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}

.tag-name { flex: 1; color: var(--text); }

.tag-count {
  font-size: 0.7rem;
  background: rgba(56, 189, 248, 0.1);
  padding: 0.1rem 0.45rem;
  border-radius: 8px;
  color: var(--accent);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.clear-btn {
  margin-top: 0.5rem;
  width: 100%;
  padding: 0.4rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: transparent;
  color: var(--text-dim);
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.2s;
}

.clear-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(56, 189, 248, 0.05);
}

/* Sort panel */
.sort-options { display: flex; flex-direction: column; gap: 2px; }

.sort-option {
  padding: 0.4rem 0.55rem;
  border-radius: 7px;
  cursor: pointer;
  font-size: 0.82rem;
  color: var(--text-dim);
  transition: all 0.15s;
  border: none;
  background: none;
  text-align: left;
  width: 100%;
}

.sort-option:hover { background: rgba(56, 189, 248, 0.06); color: var(--text); }
.sort-option.active {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: var(--bg);
  font-weight: 600;
}

/* Mini chart */
.mini-chart {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 40px;
  padding-top: 0.5rem;
}

.chart-bar {
  flex: 1;
  background: linear-gradient(to top, var(--accent), var(--accent3));
  border-radius: 2px 2px 0 0;
  min-height: 3px;
  transition: height 0.4s ease;
  opacity: 0.7;
}

.chart-bar:hover { opacity: 1; }

/* Articles */
.articles {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.article-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.2rem;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(16px);
  animation: cardIn 0.4s ease-out both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.article-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent3), var(--accent));
  background-size: 200% 100%;
  opacity: 0;
  transition: opacity 0.3s;
  animation: shimmer 3s linear infinite;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.article-card:hover {
  border-color: var(--border-hover);
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px var(--accent-glow), inset 0 1px 0 rgba(56,189,248,0.1);
}

.article-card:hover::before { opacity: 1; }

/* Banner image */
.article-banner {
  width: calc(100% + 2.4rem);
  margin: -1.2rem -1.2rem 1rem -1.2rem;
  height: 160px;
  object-fit: cover;
  border-radius: 14px 14px 0 0;
  opacity: 0.85;
  transition: opacity 0.3s;
}

.article-card:hover .article-banner { opacity: 1; }

.article-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 0.65rem;
}

.author-pic {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border);
  flex-shrink: 0;
  background: var(--surface2);
  transition: border-color 0.2s;
}

.article-card:hover .author-pic { border-color: var(--accent); }

.article-meta { flex: 1; min-width: 0; }

.author-name {
  font-weight: 600;
  font-size: 0.85rem;
  color: var(--text);
}

.article-time {
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-top: 0.1rem;
}

.reading-time {
  font-size: 0.75rem;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 0.25rem;
  padding: 0.2rem 0.6rem;
  background: rgba(56, 189, 248, 0.08);
  border-radius: 12px;
  border: 1px solid var(--border);
}

.article-title {
  font-size: 1.15rem;
  font-weight: 700;
  margin-bottom: 0.4rem;
  line-height: 1.4;
  letter-spacing: -0.01em;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.article-summary {
  font-size: 0.85rem;
  color: var(--text-dim);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 0.6rem;
}

.article-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
}

.article-tag {
  font-size: 0.7rem;
  padding: 0.15rem 0.55rem;
  border-radius: 10px;
  background: rgba(56, 189, 248, 0.1);
  color: var(--accent);
  border: 1px solid rgba(56, 189, 248, 0.15);
  font-weight: 500;
  transition: all 0.15s;
}

.article-tag:hover {
  background: rgba(56, 189, 248, 0.2);
  border-color: var(--accent);
}

.article-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 0.65rem;
  padding-top: 0.65rem;
  border-top: 1px solid var(--border);
}

.article-actions { display: flex; gap: 0.35rem; }

.action-btn {
  display: flex;
  align-items: center;
  gap: 0.25rem;
  padding: 0.25rem 0.55rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: transparent;
  color: var(--text-dim);
  font-size: 0.73rem;
  cursor: pointer;
  transition: all 0.2s;
}

.action-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(56, 189, 248, 0.05);
}

.action-btn.bookmarked { color: var(--orange); border-color: rgba(251, 191, 36, 0.3); background: rgba(251, 191, 36, 0.06); }

.word-count {
  font-size: 0.73rem;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
}

/* Loading */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 5rem;
  gap: 1.5rem;
}

.bolt-loader {
  width: 56px;
  height: 56px;
  position: relative;
}

.bolt-loader::before {
  content: '';
  position: absolute;
  inset: 0;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.bolt-loader::after {
  content: '\26A1';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  animation: boltPulse 1.5s ease-in-out infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes boltPulse {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.2); opacity: 1; }
}

.loading-text {
  color: var(--text-dim);
  font-size: 0.9rem;
  letter-spacing: 0.02em;
}

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(11, 25, 41, 0.85);
  backdrop-filter: blur(8px);
  z-index: 200;
  overflow-y: auto;
  padding: 2rem;
}

.modal-overlay.open { display: flex; justify-content: center; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 18px;
  max-width: 800px;
  width: 100%;
  padding: 2rem;
  position: relative;
  height: fit-content;
  margin: auto;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
}

/* Reading progress */
.reading-progress {
  position: fixed;
  top: 0;
  left: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent3));
  z-index: 250;
  transition: width 0.1s;
  box-shadow: 0 0 10px var(--accent-glow);
}

.modal-close {
  position: absolute;
  top: 1rem;
  right: 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-dim);
  font-size: 1.2rem;
  transition: all 0.2s;
}

.modal-close:hover {
  border-color: var(--red);
  color: var(--red);
  background: rgba(248, 113, 113, 0.08);
}

.modal-title {
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 1rem;
  padding-right: 3rem;
  line-height: 1.35;
  letter-spacing: -0.02em;
}

.modal-content {
  line-height: 1.8;
  color: var(--text-dim);
  font-size: 0.95rem;
  white-space: pre-wrap;
  word-break: break-word;
}

.modal-content h1, .modal-content h2, .modal-content h3 { color: var(--text); margin: 1.5rem 0 0.75rem; }
.modal-content p { margin-bottom: 1rem; }
.modal-content a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
.modal-content code {
  background: rgba(56, 189, 248, 0.08);
  padding: 0.15rem 0.4rem;
  border-radius: 5px;
  font-size: 0.85em;
  color: var(--accent);
}
.modal-content pre {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem;
  overflow-x: auto;
  margin: 1rem 0;
}
.modal-content blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 1rem;
  margin: 1rem 0;
}
.modal-content img { max-width: 100%; border-radius: 10px; margin: 1rem 0; }

.rendered-md h1 { font-size: 1.4rem; }
.rendered-md h2 { font-size: 1.2rem; }
.rendered-md h3 { font-size: 1.05rem; }
.rendered-md ul, .rendered-md ol { padding-left: 1.5rem; margin-bottom: 1rem; }
.rendered-md li { margin-bottom: 0.3rem; }
.rendered-md hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

/* Empty state */
.empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-dim); }

/* Relay status */
.relay-list { display: flex; flex-direction: column; gap: 0.2rem; }

.relay-item {
  display: flex;
  align-items: center;
  gap: 0.45rem;
  font-size: 0.75rem;
  color: var(--text-dim);
  padding: 0.2rem 0;
  font-family: 'SF Mono', 'Cascadia Code', monospace;
}

.relay-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.relay-dot.connected { background: var(--green); box-shadow: 0 0 6px rgba(52,211,153,0.4); }
.relay-dot.connecting { background: var(--orange); animation: pulse 1s infinite; }
.relay-dot.failed { background: var(--red); }

/* Keyboard help overlay */
.kbd-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(11, 25, 41, 0.9);
  backdrop-filter: blur(8px);
  z-index: 300;
  align-items: center;
  justify-content: center;
}

.kbd-overlay.open { display: flex; }

.kbd-panel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 2rem;
  max-width: 420px;
  width: 90%;
}

.kbd-panel h2 {
  font-size: 1.1rem;
  margin-bottom: 1rem;
  color: var(--accent);
}

.kbd-row {
  display: flex;
  justify-content: space-between;
  padding: 0.5rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.85rem;
}

.kbd-row:last-child { border-bottom: none; }

.kbd-key {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
}

kbd {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 0.15rem 0.45rem;
  font-family: monospace;
  font-size: 0.78rem;
  color: var(--accent);
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  background: var(--bg2);
  border: 1px solid var(--accent);
  border-radius: 12px;
  padding: 0.7rem 1.2rem;
  color: var(--text);
  font-size: 0.85rem;
  z-index: 300;
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px var(--accent-glow);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.toast.show { transform: translateY(0); opacity: 1; }

/* Scroll to top */
.scroll-top {
  position: fixed;
  bottom: 2rem;
  left: 2rem;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  color: var(--bg);
  font-size: 1.1rem;
  cursor: pointer;
  z-index: 50;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.3s;
  box-shadow: 0 4px 20px var(--accent-glow);
  display: flex;
  align-items: center;
  justify-content: center;
}

.scroll-top.show { opacity: 1; transform: translateY(0); }
.scroll-top:hover { transform: translateY(-3px) scale(1.1); }

/* Responsive */
@media (max-width: 900px) {
  .container { grid-template-columns: 1fr; padding: 1rem; }
  .sidebar { position: static; max-height: none; }
  .header-content { flex-direction: column; align-items: stretch; }
  .search-bar { min-width: unset; }
  .modal { margin: 0.5rem; padding: 1.25rem; }
  .stats-bar { flex-wrap: wrap; }
  .header-right { flex-wrap: wrap; }
  .article-banner { height: 120px; }
}

@media (max-width: 600px) {
  header { padding: 0.5rem 1rem; }
  .container { padding: 0.75rem; }
}
</style>

</button>

<div class="toast" id="toast"></div>

<script>
// ── Particle background ──
(function() {
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const PARTICLE_COUNT = 50;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 1.5 + 0.5,
      o: Math.random() * 0.3 + 0.05
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height;
      if (p.y > canvas.height) p.y = 0;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(56, 189, 248, ${p.o})`;
      ctx.fill();
    });

    // Draw connections
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(56, 189, 248, ${0.06 * (1 - dist/120)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── Scroll effects ──
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollTop');
  btn.classList.toggle('show', window.scrollY > 400);

  // Reading progress
  const h = document.documentElement.scrollHeight - window.innerHeight;
  const pct = h > 0 ? (window.scrollY / h * 100) : 0;
  document.getElementById('readingProgress').style.width = pct + '%';
});

// ── State ──
const RELAYS = [
  'wss://relay.damus.io',
  'wss://nos.lol',
  'wss://relay.nostr.band',
  'wss://relay.snort.social',
  'wss://nostr.wine',
  'wss://relay.primal.net'
];

let articles = [];
let profiles = {};
let tagCounts = {};
let selectedTags = new Set();
let filterMode = 'OR';
let sortMode = 'newest';
let bookmarks = new Set(JSON.parse(localStorage.getItem('nostr-bookmarks') || '[]'));
let showBookmarksOnly = false;
let relayStates = {};

// ── Relay connections ──
function connectRelays() {
  const subId = 'a-' + Math.random().toString(36).slice(2, 8);
  const filter = { kinds: [30023], limit: 21 };
  const profilePubkeys = new Set();

  RELAYS.forEach(url => {
    relayStates[url] = 'connecting';
    renderRelayStatus();

    try {
      const ws = new WebSocket(url);

      ws.onopen = () => {
        relayStates[url] = 'connected';
        renderRelayStatus();
        updateStatus();
        ws.send(JSON.stringify(['REQ', subId, filter]));
      };

      ws.onmessage = (msg) => {
        try {
          const data = JSON.parse(msg.data);
          if (data[0] === 'EVENT' && data[2]) {
            const ev = data[2];
            if (ev.kind === 30023) {
              addArticle(ev);
              if (!profiles[ev.pubkey]) profilePubkeys.add(ev.pubkey);
            } else if (ev.kind === 0) {
              try { profiles[ev.pubkey] = JSON.parse(ev.content); renderArticles(); } catch(e) {}
            }
          } else if (data[0] === 'EOSE') {
            if (profilePubkeys.size > 0) {
              ws.send(JSON.stringify(['REQ', 'p-' + Math.random().toString(36).slice(2,8), { kinds: [0], authors: [...profilePubkeys] }]));
              profilePubkeys.clear();
            }
          }
        } catch(e) {}
      };

      ws.onerror = () => { relayStates[url] = 'failed'; renderRelayStatus(); };
      ws.onclose = () => { if (relayStates[url] === 'connected') relayStates[url] = 'failed'; renderRelayStatus(); updateStatus(); };
    } catch(e) {
      relayStates[url] = 'failed';
      renderRelayStatus();
    }
  });
}

function addArticle(event) {
  if (articles.find(a => a.id === event.id)) return;

  const tags = {};
  const tTags = [];
  (event.tags || []).forEach(t => {
    if (t[0] === 'title' && t[1]) tags.title = t[1];
    if (t[0] === 'summary' && t[1]) tags.summary = t[1];
    if (t[0] === 'image' && t[1]) tags.image = t[1];
    if (t[0] === 'published_at' && t[1]) tags.published_at = parseInt(t[1]);
    if (t[0] === 't' && t[1]) tTags.push(t[1].toLowerCase());
    if (t[0] === 'd' && t[1]) tags.d = t[1];
  });

  articles.push({
    id: event.id,
    pubkey: event.pubkey,
    title: tags.title || 'Untitled',
    summary: tags.summary || (event.content || '').slice(0, 200),
    image: tags.image,
    content: event.content || '',
    tags: tTags,
    timestamp: tags.published_at || event.created_at,
    wordCount: (event.content || '').split(/\s+/).length,
    d: tags.d
  });

  tTags.forEach(tag => { tagCounts[tag] = (tagCounts[tag] || 0) + 1; });

  renderTags();
  renderArticles();
  updateStatus();
  renderChart();
}

// ── Rendering ──
function renderRelayStatus() {
  document.getElementById('relayList').innerHTML = RELAYS.map(url => {
    const s = relayStates[url] || 'connecting';
    return `<div class="relay-item"><span class="relay-dot ${s}"></span>${url.replace('wss://','')}</div>`;
  }).join('');
}

function updateStatus() {
  const c = Object.values(relayStates).filter(s => s === 'connected').length;
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className = c > 0 ? 'dot green' : 'dot orange';
  text.textContent = c > 0 ? `${c} relays` : 'Connecting...';
  document.getElementById('articleCount').textContent = articles.length;
  document.getElementById('authorCount').textContent = new Set(articles.map(a => a.pubkey)).size;
}

function renderTags() {
  const sorted = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]);
  document.getElementById('tagList').innerHTML = sorted.map(([tag, count]) => `
    <label class="tag-item">
      <input type="checkbox" ${selectedTags.has(tag) ? 'checked' : ''} onchange="toggleTag('${tag.replace(/'/g, "\\'")}')">
      <span class="tag-name">#${tag}</span>
      <span class="tag-count">${count}</span>
    </label>
  `).join('');
}

function renderChart() {
  // Activity chart: articles per day (last 14 days)
  const now = Date.now() / 1000;
  const days = 14;
  const buckets = new Array(days).fill(0);
  articles.forEach(a => {
    const age = (now - a.timestamp) / 86400;
    const idx = Math.floor(age);
    if (idx >= 0 && idx < days) buckets[days - 1 - idx]++;
  });
  const max = Math.max(...buckets, 1);
  document.getElementById('miniChart').innerHTML = buckets.map(v =>
    `<div class="chart-bar" style="height:${Math.max(8, (v/max)*100)}%" title="${v} articles"></div>`
  ).join('');
}

function renderArticles() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtered = articles.filter(a => {
    if (search && !a.title.toLowerCase().includes(search) &&
        !a.summary.toLowerCase().includes(search) &&
        !a.tags.some(t => t.includes(search))) return false;
    if (showBookmarksOnly && !bookmarks.has(a.id)) return false;
    if (selectedTags.size > 0) {
      if (filterMode === 'AND') return [...selectedTags].every(t => a.tags.includes(t));
      else return [...selectedTags].some(t => a.tags.includes(t));
    }
    return true;
  });

  filtered.sort((a, b) => {
    switch(sortMode) {
      case 'newest': return b.timestamp - a.timestamp;
      case 'oldest': return a.timestamp - b.timestamp;
      case 'title': return a.title.localeCompare(b.title);
      case 'wordcount': return b.wordCount - a.wordCount;
      default: return 0;
    }
  });

  const el = document.getElementById('articles');

  if (articles.length === 0) {
    el.innerHTML = `<div class="loading"><div class="bolt-loader"></div><div class="loading-text">Fetching articles from Nostr relays...</div></div>`;
    return;
  }

  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty-state"><p style="font-size:2rem;margin-bottom:0.5rem">&#x1F50D;</p><p>No articles match your filters</p></div>`;
    return;
  }

  el.innerHTML = filtered.map((a, i) => {
    const p = profiles[a.pubkey] || {};
    const name = p.display_name || p.name || a.pubkey.slice(0, 12) + '...';
    const pic = p.picture || '';
    const date = new Date(a.timestamp * 1000);
    const timeAgo = getTimeAgo(a.timestamp);
    const readTime = Math.max(1, Math.round(a.wordCount / 200));
    const isBookmarked = bookmarks.has(a.id);

    return `<article class="article-card" style="animation-delay:${Math.min(i * 0.04, 0.5)}s" onclick="openArticle('${a.id}')">
      ${a.image ? `<img class="article-banner" src="${a.image}" alt="" onerror="this.remove()" loading="lazy">` : ''}
      <div class="article-header">
        ${pic ? `<img class="author-pic" src="${pic}" alt="${escHtml(name)}" onerror="this.outerHTML='<div class=\\'author-pic\\' style=\\'display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--accent)\\'>${name[0]?.toUpperCase() || '?'}</div>'">` : `<div class="author-pic" style="display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--accent)">${name[0]?.toUpperCase() || '?'}</div>`}
        <div class="article-meta">
          <div class="author-name">${escHtml(name)}</div>
          <div class="article-time">${timeAgo}</div>
        </div>
        <div class="reading-time">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          ${readTime}m
        </div>
      </div>
      <div class="article-title">${escHtml(a.title)}</div>
      <div class="article-summary">${escHtml(a.summary)}</div>
      <div class="article-tags">${a.tags.slice(0, 5).map(t => `<span class="article-tag">#${escHtml(t)}</span>`).join('')}</div>
      <div class="article-footer">
        <div class="article-actions">
          <button class="action-btn ${isBookmarked ? 'bookmarked' : ''}" onclick="event.stopPropagation();toggleBookmark('${a.id}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="${isBookmarked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            ${isBookmarked ? 'Saved' : 'Save'}
          </button>
          <button class="action-btn" onclick="event.stopPropagation();copyLink('${a.id}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            Link
          </button>
          <button class="action-btn" onclick="event.stopPropagation();shareArticle('${a.id}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            Share
          </button>
        </div>
        <span class="word-count">${a.wordCount.toLocaleString()} words</span>
      </div>
    </article>`;
  }).join('');
}

// ── Helpers ──
function getTimeAgo(ts) {
  const diff = Date.now() / 1000 - ts;
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  if (diff < 2592000) return Math.floor(diff / 86400) + 'd ago';
  return new Date(ts * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function renderMarkdown(md) {
  return md
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^---$/gm, '<hr>')
    .replace(/^\- (.+)$/gm, '<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

function openArticle(id) {
  const a = articles.find(x => x.id === id);
  if (!a) return;
  const p = profiles[a.pubkey] || {};
  const name = p.display_name || p.name || a.pubkey.slice(0, 12) + '...';
  const pic = p.picture || '';
  const timeStr = new Date(a.timestamp * 1000).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

  document.getElementById('modalHeader').innerHTML = `
    <div style="display:flex;align-items:center;gap:0.75rem">
      ${pic ? `<img class="author-pic" src="${pic}" alt="${escHtml(name)}" onerror="this.style.display='none'">` : ''}
      <div>
        <div class="author-name">${escHtml(name)}</div>
        <div class="article-time">${timeStr} &middot; ${a.wordCount.toLocaleString()} words &middot; ${Math.max(1, Math.round(a.wordCount / 200))} min read</div>
      </div>
    </div>`;
  document.getElementById('modalTitle').textContent = a.title;
  document.getElementById('modalContent').innerHTML = '<p>' + renderMarkdown(a.content) + '</p>';
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function setFilterMode(mode) {
  filterMode = mode;
  document.getElementById('andBtn').classList.toggle('active', mode === 'AND');
  document.getElementById('orBtn').classList.toggle('active', mode === 'OR');
  renderArticles();
}

function toggleTag(tag) {
  if (selectedTags.has(tag)) selectedTags.delete(tag);
  else selectedTags.add(tag);
  document.getElementById('filterCount').textContent = selectedTags.size || '0';
  renderTags();
  renderArticles();
}

function clearFilters() {
  selectedTags.clear();
  document.getElementById('filterCount').textContent = '0';
  renderTags();
  renderArticles();
}

function setSort(mode) {
  sortMode = mode;
  document.querySelectorAll('.sort-option[data-sort]').forEach(el => el.classList.toggle('active', el.dataset.sort === mode));
  renderArticles();
}

function toggleBookmark(id) {
  if (bookmarks.has(id)) bookmarks.delete(id);
  else bookmarks.add(id);
  localStorage.setItem('nostr-bookmarks', JSON.stringify([...bookmarks]));
  document.getElementById('bookmarkCount').textContent = bookmarks.size + ' saved';
  renderArticles();
  showToast(bookmarks.has(id) ? '\u26A1 Bookmarked!' : 'Removed');
}

function toggleBookmarkFilter() {
  showBookmarksOnly = !showBookmarksOnly;
  const btn = document.getElementById('bookmarkToggle');
  btn.classList.toggle('active', showBookmarksOnly);
  btn.textContent = showBookmarksOnly ? 'Show All' : 'Show Bookmarked';
  renderArticles();
}

function copyLink(id) {
  navigator.clipboard.writeText(`https://njump.me/${id}`).then(() => showToast('\u26A1 Link copied!')).catch(() => showToast('Copy failed'));
}

function shareArticle(id) {
  const a = articles.find(x => x.id === id);
  if (!a) return;
  if (navigator.share) {
    navigator.share({ title: a.title, text: a.summary, url: `https://njump.me/${id}` }).catch(() => {});
  } else { copyLink(id); }
}

function randomArticle() {
  if (articles.length === 0) return;
  const a = articles[Math.floor(Math.random() * articles.length)];
  openArticle(a.id);
  showToast('\u{1F3B2} Random pick!');
}

function toggleKbdHelp() {
  document.getElementById('kbdOverlay').classList.toggle('open');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.innerHTML = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', (e) => {
  if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') {
    if (e.key === 'Escape') document.activeElement.blur();
    return;
  }
  if (e.key === 'Escape') { closeModal(); document.getElementById('kbdOverlay').classList.remove('open'); }
  if (e.key === '/') { e.preventDefault(); document.getElementById('searchInput').focus(); }
  if (e.key === 'r' || e.key === 'R') randomArticle();
  if (e.key === 't' || e.key === 'T') window.scrollTo({ top: 0, behavior: 'smooth' });
  if (e.key === 'f' || e.key === 'F') setFilterMode(filterMode === 'OR' ? 'AND' : 'OR');
  if (e.key === '?') toggleKbdHelp();
});

document.getElementById('searchInput').addEventListener('input', () => renderArticles());

// ── Init ──
renderRelayStatus();
connectRelays();
document.getElementById('bookmarkCount').textContent = bookmarks.size + ' saved';
</script>
</body>
</html>
